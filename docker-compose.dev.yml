services:
  scron:
    build:
      context: .
      target: dev        # targets the dev stage in Dockerfile
    volumes:
      - .:/app           # mount local code into container for hot reload
    environment:
      - RELOAD=true
      - LOG_LEVEL=DEBUG
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-not-for-production}
      - DB_SCHEMA=${DB_SCHEMA:-scron}
    ports:
      - "8000:8000"