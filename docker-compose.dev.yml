services:
  scron:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    environment:
      - RELOAD=true
      - LOG_LEVEL=DEBUG
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-not-for-production}
      - DB_SCHEMA=${DB_SCHEMA:-scron}
    ports:
      - "8000:8000"
    develop:
      watch:
        - action: sync
          path: ./app # adjust to wherever your source code lives
          target: /app/src
        - action: rebuild
          path: ./requirements.txt
        - action: rebuild
          path: ./Dockerfile
