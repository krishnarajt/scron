services:
  scron:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      - /app/.venv        # ← this shadows .venv, keeps it inside the container only
      - app_logs:/app/logs
    environment:
      - RELOAD=true
      - LOG_LEVEL=DEBUG
      - LOG_DIR=/app/logs
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-not-for-production}
      - DB_SCHEMA=${DB_SCHEMA:-scron}
    ports:
      - "8000:8000"
    develop:
      watch:
        - action: sync
          path: ./app
          target: /app/src
        - action: rebuild
          path: ./requirements.txt
        - action: rebuild
          path: ./Dockerfile

