services:
  scron:
    build: .
    container_name: scron
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://second_thought:second_thought@postgres:5432/second_thought
      - DB_SCHEMA=${DB_SCHEMA:-scron}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env or environment}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - RELOAD=false
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scron-network

  postgres:
    image: postgres:15-alpine
    container_name: scron-postgres
    environment:
      - POSTGRES_USER=second_thought
      - POSTGRES_PASSWORD=second_thought
      - POSTGRES_DB=second_thought
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U second_thought -d second_thought"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - scron-network

volumes:
  postgres_data:

networks:
  scron-network:
    driver: bridge