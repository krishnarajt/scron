server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: scron
    static_configs:
      - targets:
          - localhost
        labels:
          job: scron
          __path__: /app/logs/app.log*  # * picks up rotated files too
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            message: message
      - labels:
          level:
          logger: